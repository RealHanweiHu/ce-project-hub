<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CE Hub Robot Message Preview</title>
    <style>
      @font-face {
        font-family: "Hanken Grotesk";
        src: url("../../client/public/fonts/hanken_grotesk_600.woff2") format("woff2");
        font-weight: 600;
      }

      @font-face {
        font-family: "Hanken Grotesk";
        src: url("../../client/public/fonts/hanken_grotesk_400.woff2") format("woff2");
        font-weight: 400;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 1200px;
        height: 800px;
        margin: 0;
        overflow: hidden;
        font-family:
          "Hanken Grotesk", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
        color: #17202a;
        background: #f6f8fb;
      }

      .canvas {
        position: relative;
        width: 1200px;
        height: 800px;
        padding: 72px 86px;
        background:
          linear-gradient(135deg, rgba(11, 120, 99, 0.08), transparent 42%),
          linear-gradient(315deg, rgba(46, 93, 222, 0.09), transparent 36%),
          #f6f8fb;
      }

      .topline {
        display: flex;
        align-items: center;
        gap: 18px;
        margin-bottom: 54px;
      }

      .logo {
        display: grid;
        width: 74px;
        height: 74px;
        place-items: center;
        border-radius: 18px;
        color: white;
        font-size: 30px;
        font-weight: 700;
        background: #0b7863;
        box-shadow: 0 18px 42px rgba(11, 120, 99, 0.26);
      }

      .brand {
        font-size: 44px;
        line-height: 1;
        font-weight: 700;
      }

      .subtitle {
        margin-top: 10px;
        color: #667085;
        font-size: 22px;
      }

      .content {
        display: grid;
        grid-template-columns: 1fr 420px;
        gap: 64px;
        align-items: center;
      }

      .headline {
        max-width: 610px;
        font-size: 58px;
        line-height: 1.1;
        font-weight: 700;
      }

      .copy {
        max-width: 560px;
        margin-top: 24px;
        color: #4d5b6a;
        font-size: 25px;
        line-height: 1.5;
      }

      .signals {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-top: 42px;
      }

      .signal {
        min-width: 148px;
        padding: 14px 18px;
        border: 1px solid #dce3ea;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        font-size: 20px;
        font-weight: 600;
      }

      .phone {
        width: 420px;
        height: 612px;
        padding: 24px;
        border: 1px solid #d6dde5;
        border-radius: 36px;
        background: #121922;
        box-shadow: 0 28px 80px rgba(23, 32, 42, 0.2);
      }

      .screen {
        height: 100%;
        padding: 22px;
        border-radius: 24px;
        background: #eef2f6;
      }

      .chat-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
        color: #1d2939;
        font-size: 20px;
        font-weight: 700;
      }

      .time {
        color: #7a8794;
        font-size: 14px;
        font-weight: 600;
      }

      .message-row {
        display: flex;
        gap: 12px;
      }

      .bot-avatar {
        display: grid;
        flex: 0 0 auto;
        width: 42px;
        height: 42px;
        place-items: center;
        border-radius: 11px;
        color: white;
        font-size: 18px;
        font-weight: 700;
        background: #0b7863;
      }

      .card {
        flex: 1;
        overflow: hidden;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        background: #ffffff;
        box-shadow: 0 12px 30px rgba(23, 32, 42, 0.08);
      }

      .card-bar {
        padding: 15px 18px;
        color: #ffffff;
        background: #2563eb;
        font-size: 18px;
        font-weight: 700;
      }

      .card-body {
        padding: 18px;
      }

      .card-title {
        color: #17202a;
        font-size: 22px;
        line-height: 1.28;
        font-weight: 700;
      }

      .meta {
        display: grid;
        gap: 10px;
        margin: 18px 0;
      }

      .meta-row {
        display: flex;
        justify-content: space-between;
        color: #5d6b7a;
        font-size: 15px;
      }

      .meta-row strong {
        color: #1d2939;
        font-weight: 700;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 18px;
      }

      .button {
        display: grid;
        min-height: 42px;
        place-items: center;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 700;
      }

      .button.primary {
        color: white;
        background: #0b7863;
      }

      .button.secondary {
        color: #0b7863;
        border: 1px solid #b9d8d0;
        background: #f4fbf9;
      }

      .footer {
        position: absolute;
        right: 86px;
        bottom: 52px;
        color: #718096;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <main class="canvas">
      <section class="topline">
        <div class="logo">CE</div>
        <div>
          <div class="brand">CE Hub 机器人</div>
          <div class="subtitle">项目行动项自动触达，处理结果自动留痕</div>
        </div>
      </section>

      <section class="content">
        <div>
          <div class="headline">让明确责任的事项主动找到负责人</div>
          <div class="copy">
            审批、评审、验证和异常升级进入个人通道；纯通知进入摘要，减少噪音。
          </div>
          <div class="signals">
            <div class="signal">直达链接</div>
            <div class="signal">一键处理</div>
            <div class="signal">SLA 升级</div>
            <div class="signal">全程留痕</div>
          </div>
        </div>

        <div class="phone">
          <div class="screen">
            <div class="chat-header">
              <span>CE Hub</span>
              <span class="time">09:00</span>
            </div>
            <div class="message-row">
              <div class="bot-avatar">CE</div>
              <div class="card">
                <div class="card-bar">待你处理</div>
                <div class="card-body">
                  <div class="card-title">交付物需要评审</div>
                  <div class="meta">
                    <div class="meta-row">
                      <span>项目</span>
                      <strong>MP Release</strong>
                    </div>
                    <div class="meta-row">
                      <span>负责人</span>
                      <strong>评审人</strong>
                    </div>
                    <div class="meta-row">
                      <span>截止</span>
                      <strong>明天 18:00</strong>
                    </div>
                  </div>
                  <div class="actions">
                    <div class="button primary">通过</div>
                    <div class="button secondary">驳回</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <div class="footer">机器人消息预览图</div>
    </main>
  </body>
</html>
