# 生产编排（阿里云 ECS）：数据库用 RDS，因此没有 db 服务；
# 对象存储用内置 MinIO（数据落 ECS 磁盘卷）。
# 用法：docker compose -f docker-compose.prod.yml up -d --build
services:
  app:
    build: .
    restart: unless-stopped
    ports:
      # ERP 看板的 nginx 已占用 80/443，本应用暴露在 3001，由 nginx 反代
      - "3001:3000"
    env_file: .env
    volumes:
      - ./certs:/app/certs:ro
    depends_on:
      - minio

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data

volumes:
  miniodata:
