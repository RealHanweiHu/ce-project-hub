<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>CE Project Hub</title>    
    <!-- Fonts are self-hosted under /fonts/ for China mainland accessibility -->
  </head>

  <body>
    <div id="root">
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fafaf9;color:#78716c;font:12px monospace;letter-spacing:.08em;text-transform:uppercase;">
        正在加载 CE Project Hub...
      </div>
    </div>
    <script>
      (function () {
        var shown = false;
        var timer = null;
        function render(message, ready) {
          var root = document.getElementById("root");
          if (!root) return;
          root.innerHTML =
            '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fafaf9;padding:24px;color:#292524;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;">' +
            '<div style="max-width:420px;border:1px solid #e7e5e4;background:white;padding:24px;box-shadow:0 20px 45px rgba(0,0,0,.08);">' +
            '<div style="font-size:20px;font-weight:600;margin-bottom:8px;">' + (ready ? "服务已恢复" : "页面资源加载失败") + '</div>' +
            '<div style="font-size:13px;line-height:1.7;color:#57534e;margin-bottom:16px;">' + message + '</div>' +
            '<button id="ce-startup-reload" style="border:0;background:#1c1917;color:white;padding:9px 14px;font-size:12px;font-family:monospace;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;">刷新页面</button>' +
            '</div></div>';
          var button = document.getElementById("ce-startup-reload");
          if (button) button.onclick = function () { window.location.reload(); };
        }
        function poll() {
          if (timer) return;
          timer = window.setInterval(function () {
            fetch("/", { method: "HEAD", cache: "no-store" })
              .then(function () {
                window.clearInterval(timer);
                timer = null;
                render("服务已恢复，可以刷新回到当前页面。", true);
              })
              .catch(function () {
                render("服务暂时不可用，正在等待恢复；恢复后这里会出现刷新入口。", false);
              });
          }, 3000);
        }
        function show() {
          if (shown) return;
          shown = true;
          render("服务重启或网络抖动时，脚本资源可能加载失败。请等待服务恢复后刷新。", false);
          poll();
        }
        window.addEventListener("error", function (event) {
          var target = event.target;
          if (target && (target.tagName === "SCRIPT" || target.tagName === "LINK")) show();
        }, true);
        window.addEventListener("unhandledrejection", function (event) {
          var reason = String(event.reason && (event.reason.message || event.reason));
          if (/Failed to fetch|ERR_CONNECTION_REFUSED|dynamically imported module|Importing a module script failed|Loading chunk/i.test(reason)) show();
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
